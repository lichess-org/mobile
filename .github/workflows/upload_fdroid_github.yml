name: Upload the F-Droid APK to Github
on:
  push:
    tags:
      - 'v*.*.*.fdroid'

permissions:
  contents: write

jobs:
  github-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mobile code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Read Flutter version
        run: echo "FLUTTER_VERSION=$(cat flutter-version)" >> $GITHUB_ENV

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        run: |
          git -C ${{ env.FLUTTER_ROOT }} apply $GITHUB_WORKSPACE/flutter.patch
          rm ${{ env.FLUTTER_ROOT }}/bin/cache/flutter_tools.snapshot

      - name: Install dependencies
        run: flutter pub get

      - name: Patch dependencies
        run: |
          sed -i 's/-Wl,/-Wl,--build-id=none,/' ~/.pub-cache/hosted/pub.dev/jni-*/src/CMakeLists.txt
          sed -i 's/-Wl,/-Wl,--build-id=none,/' ~/.pub-cache/hosted/pub.dev/multistockfish_chess-*/src/CMakeLists.txt
          sed -i 's/-Wl,/-Wl,--build-id=none,/' ~/.pub-cache/hosted/pub.dev/multistockfish_sf16-*/src/CMakeLists.txt
          sed -i 's/-Wl,/-Wl,--build-id=none,/' ~/.pub-cache/hosted/pub.dev/multistockfish_variant-*/android/CMakeLists.txt
          truncate -s 0 ~/.pub-cache/hosted/pub.dev/webcrypto-*/src/CMakeLists.txt

      - name: Code generation
        run: dart run build_runner build

      - name: Build APK
        run: flutter build apk --dart-define=cronetHttpNoPlay=true --dart-define=LICHESS_HOST=lichess.org --dart-define=LICHESS_WS_HOST=socket.lichess.org --dart-define=LICHESS_WS_SECRET=wG1OLhUR3CSXdDybqrtIW227QGrtiM3d

      - name: Rename APK
        run: |
          VERSION_CODE=$(yq eval '.version' pubspec.yaml | cut -d '+' -f 2)
          VERSION_CODE=$((10#$VERSION_CODE))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/${VERSION_CODE}-fdroid.apk

      - name: Determine release tag
        run: |
          TRIGGER_TAG=${GITHUB_REF#refs/tags/}
          RELEASE_TAG=${TRIGGER_TAG%.fdroid}
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: build/app/outputs/flutter-apk/${{ env.VERSION_CODE }}-fdroid.apk
